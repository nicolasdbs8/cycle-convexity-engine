name: multi-mvp

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TAG: robust_b150_s2_5_ma52_core90_sat10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch crypto/ETF data
        run: |
          python scripts/fetch_yahoo.py

      # NEW — build crypto monthly universe
      - name: Build crypto monthly universe
        run: |
          python tools/make_crypto_monthly.py --n 3 --mom_bars 180 --min_dvol_usd 0

      - name: Upload crypto universe schedule
        uses: actions/upload-artifact@v4
        with:
          name: crypto_monthly_schedule
          path: data/universe/crypto_monthly.csv
          if-no-files-found: error
          
      # Backtest
      - name: Run multi MVP (2005-2014)
        run: |
          PYTHONPATH=. python run_backtest_multi.py \
            --tag "test_2005_2012" \
            --symbols BTC,ETH,BNB,SOL,XRP,ADA,DOGE,TRX,LINK,SPY,QQQ,IWM,EFA,EEM,GLD,TLT,IEF,SHY,DBC \
            --start 2005-01-01 \
            --end 2012-12-31

      - name: Run multi MVP (2013-2018)
        run: |
          PYTHONPATH=. python run_backtest_multi.py \
            --tag "test_2013_2018" \
            --symbols BTC,ETH,BNB,SOL,XRP,ADA,DOGE,TRX,LINK,SPY,QQQ,IWM,EFA,EEM,GLD,TLT,IEF,SHY,DBC \
            --start 2013-01-01 \
            --end 2018-12-31

      - name: Run multi MVP (2019-2026)
        run: |
          PYTHONPATH=. python run_backtest_multi.py \
            --tag "test_2019_2026" \
            --symbols BTC,ETH,BNB,SOL,XRP,ADA,DOGE,TRX,LINK,SPY,QQQ,IWM,EFA,EEM,GLD,TLT,IEF,SHY,DBC \
            --start 2019-01-01 \
            --end 2026-03-03

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: outputs
          path: |
            data/outputs/**
            data/universe/crypto_monthly.csv
          if-no-files-found: warn
