name: fetch-data

on:
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch Yahoo data -> data/raw/*.csv
        run: |
          PYTHONPATH=. python scripts/fetch_yahoo.py

      - name: Commit CSVs
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add data/raw/*.csv
          git commit -m "data: refresh yahoo csvs" || echo "No changes to commit"
          git push
