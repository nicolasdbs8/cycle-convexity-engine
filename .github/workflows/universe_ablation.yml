name: universe-ablation

on:
  workflow_dispatch:
  push:

env:
  SYMBOLS: BTC,ETH,BNB,SOL,XRP,ADA,DOGE,TRX,LINK,SPY,QQQ,IWM,EFA,EEM,GLD,TLT,IEF,SHY,XLK,XLF,XLE,XLY,XLI,XLP,XLV,XLB,DBC,EWJ,EWU,FXI,EWT,INDA

jobs:

  ablation:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        remove:
          - BTC
          - ETH
          - BNB
          - SOL
          - XRP
          - ADA
          - DOGE
          - TRX
          - LINK
          - SPY
          - QQQ
          - IWM
          - EFA
          - EEM
          - GLD
          - TLT
          - IEF
          - SHY
          - XLK
          - XLF
          - XLE
          - XLY
          - XLI
          - XLP
          - XLV
          - XLB
          - DBC
          - EWJ
          - EWU
          - FXI
          - EWT
          - INDA

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch data
        run: |
          python scripts/fetch_yahoo.py

      - name: Build reduced universe
        run: |
          python - << 'PY'
          import os
          symbols = os.environ["SYMBOLS"].split(",")
          remove = "${{ matrix.remove }}"
          reduced = [s for s in symbols if s != remove]
          print("REDUCED=" + ",".join(reduced))
          with open(os.environ["GITHUB_ENV"], "a") as f:
              f.write("REDUCED=" + ",".join(reduced) + "\n")
          PY

      - name: Run backtest
        run: |
          PYTHONPATH=. python run_backtest_multi.py \
            --tag ablation_minus_${{ matrix.remove }} \
            --symbols "$REDUCED" | tee ablation_${{ matrix.remove }}.log

      - name: Upload logs
        uses: actions/upload-artifact@v4
        with:
          name: ablation_${{ matrix.remove }}
          path: ablation_${{ matrix.remove }}.log


  collect:

    runs-on: ubuntu-latest
    needs: ablation

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pandas
        run: |
          python -m pip install pandas

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: logs

      - name: Parse logs
        run: |
          python - << 'PY'
          import re
          import pandas as pd
          from pathlib import Path

          rows = []

          for p in Path("logs").rglob("*.log"):

              text = p.read_text()

              def extract(k):
                  m = re.search(rf'"{k}":\s*([0-9\.\-eE]+)', text)
                  return float(m.group(1)) if m else None

              rows.append({
                  "file": p.name,
                  "CAGR": extract("CAGR"),
                  "MaxDD": extract("MaxDD"),
                  "ProfitFactor": extract("ProfitFactor"),
                  "NumTrades": extract("NumTrades"),
                  "HitRate": extract("HitRate"),
              })

          df = pd.DataFrame(rows)

          df = df.sort_values("CAGR", ascending=False)

          df.to_csv("ablation_summary.csv", index=False)

          print(df)
          PY

      - name: Upload summary
        uses: actions/upload-artifact@v4
        with:
          name: ablation_summary
          path: ablation_summary.csv
