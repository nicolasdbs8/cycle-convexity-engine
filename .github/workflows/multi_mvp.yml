name: multi-mvp

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TAG: mvp_macro_no_crypto

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run multi MVP
        run: |
          PYTHONPATH=. python run_backtest_multi.py --tag $TAG --symbols SPY,QQQ,GLD,TLT,USO

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ env.TAG }}
          path: data/outputs/${{ env.TAG }}/
          if-no-files-found: error
