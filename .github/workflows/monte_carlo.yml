name: monte-carlo

on:
  workflow_dispatch:

jobs:
  mc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Monte Carlo
        run: |
          PYTHONPATH=. python scripts/monte_carlo.py
