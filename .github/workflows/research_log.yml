name: research-log

on:
  workflow_dispatch:
  schedule:
    - cron: "15 3 * * *"   # daily 03:15 UTC
  push:
    paths:
      - "data/outputs/**"
      - "scripts/update_research_log.py"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Update research log
        run: |
          PYTHONPATH=. python scripts/update_research_log.py

      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RESEARCH_LOG.md
          git commit -m "chore: update research log"
          git push
