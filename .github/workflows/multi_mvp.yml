name: multi-mvp

on:
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TAG: robust_b150_s2_5_ma52_core80_sat20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # NEW — build crypto monthly universe
      - name: Build crypto monthly universe
        run: |
          python tools/make_crypto_monthly.py --n 3 --mom_bars 180 --min_dvol_usd 0

      # Backtest
      - name: Run multi MVP
        run: |
          PYTHONPATH=. python run_backtest_multi.py --tag $TAG --symbols BTC,ETH,SPY,QQQ,GLD,TLT,USO

      - name: Upload outputs
        uses: actions/upload-artifact@v4
        with:
          name: outputs-${{ env.TAG }}
          path: data/outputs/${{ env.TAG }}/
          if-no-files-found: error
